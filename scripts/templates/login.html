<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HRP Command Center — Login</title>
    <link rel="stylesheet" href="/static/dashboard.css">
    <style>
        .login-page {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            position: relative;
            overflow: hidden;
        }

        /* Animated gradient orbs */
        .login-page::before,
        .login-page::after {
            content: '';
            position: absolute;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.35;
            animation: orb-float 15s ease-in-out infinite alternate;
        }

        .login-page::before {
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, var(--blue), transparent 70%);
            top: -10%;
            right: -5%;
        }

        .login-page::after {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, var(--purple), transparent 70%);
            bottom: -10%;
            left: -5%;
            animation-delay: -7s;
        }

        @keyframes orb-float {
            0% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(30px, -20px) scale(1.1); }
            100% { transform: translate(-20px, 30px) scale(0.95); }
        }

        .login-card {
            position: relative;
            z-index: 1;
            background: rgba(17, 24, 39, 0.8);
            border: 1px solid var(--border-hover);
            border-radius: var(--radius-lg);
            padding: 48px 40px 36px;
            width: 400px;
            max-width: 92vw;
            backdrop-filter: blur(24px) saturate(1.5);
            -webkit-backdrop-filter: blur(24px) saturate(1.5);
            box-shadow: var(--shadow-lg), 0 0 80px rgba(59, 130, 246, 0.04);
            text-align: center;
            animation: card-enter 0.6s var(--ease) both;
        }

        @keyframes card-enter {
            from {
                opacity: 0;
                transform: translateY(24px) scale(0.97);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .login-brand {
            margin-bottom: 32px;
        }

        .login-brand .logo {
            font-size: 26px;
            font-weight: 800;
            letter-spacing: -0.5px;
            margin-bottom: 6px;
        }

        .login-brand .tagline {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 2.5px;
        }

        .login-divider {
            width: 60px;
            height: 2px;
            background: linear-gradient(90deg, var(--blue), var(--purple));
            margin: 16px auto 24px;
            border-radius: 2px;
        }

        .login-input {
            width: 100%;
            padding: 14px 18px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--text-primary);
            font-family: inherit;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 14px;
            outline: none;
            transition: all 0.2s var(--ease);
            letter-spacing: 2px;
        }

        .login-input::placeholder {
            color: var(--text-dim);
            letter-spacing: 0.5px;
            font-weight: 400;
        }

        .login-input:focus {
            border-color: var(--blue);
            box-shadow: 0 0 0 3px var(--blue-dim), 0 0 20px rgba(59, 130, 246, 0.08);
            background: rgba(255, 255, 255, 0.05);
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--blue), #6366f1);
            border: none;
            border-radius: var(--radius-sm);
            color: white;
            font-family: inherit;
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: all 0.25s var(--ease);
            position: relative;
            overflow: hidden;
        }

        .login-btn::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, transparent 40%, rgba(255,255,255,0.1) 50%, transparent 60%);
            transform: translateX(-100%);
            transition: transform 0.4s;
        }

        .login-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 20px rgba(59, 130, 246, 0.3);
        }

        .login-btn:hover::after {
            transform: translateX(100%);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .login-error {
            color: var(--red);
            font-size: 12px;
            font-weight: 500;
            margin-top: 10px;
            min-height: 18px;
        }

        .login-footer {
            margin-top: 28px;
            font-size: 10px;
            color: var(--text-dim);
            letter-spacing: 0.5px;
        }

        .login-footer .version {
            display: inline-block;
            padding: 2px 8px;
            background: var(--bg-glass);
            border: 1px solid var(--border);
            border-radius: 4px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 9px;
            margin-left: 4px;
        }
    </style>
</head>

<body>
    <div class="login-page">
        <div class="login-card">
            <div class="login-brand">
                <div class="logo">🏇 HRP Command Center</div>
                <div class="tagline">Stable Intelligence Platform</div>
            </div>
            <div class="login-divider"></div>
            <form method="POST" action="/login">
                <input type="password" name="password" class="login-input" placeholder="Enter access code" autofocus
                    required>
                <button type="submit" class="login-btn">Authenticate</button>
                <div class="login-error">
                    {% if error %}{{ error }}{% endif %}
                </div>
            </form>
            <div class="login-footer">
                © 2026 Ire Iron Stables <span class="version">v2.1</span>
            </div>
        </div>
    </div>
</body>

</html>
